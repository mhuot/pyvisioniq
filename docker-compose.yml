services:
  pyvisionic:
    container_name: pyvisionic
    build: .
    expose:
      - "${PORT:-5000}"
    environment:
      - BLUELINKUSER=${BLUELINKUSER}
      - BLUELINKPASS=${BLUELINKPASS}
      - BLUELINKPIN=${BLUELINKPIN}
      - BLUELINKVID=${BLUELINKVID}
      - BLUELINKREGION=${BLUELINKREGION:-3}
      - BLUELINKBRAND=${BLUELINKBRAND:-2}
      - FLASK_ENV=${FLASK_ENV:-production}
      - PORT=${PORT:-5000}
      - API_DAILY_LIMIT=${API_DAILY_LIMIT:-30}
      - API_CACHE_ENABLED=${API_CACHE_ENABLED:-true}
      - CACHE_DURATION_HOURS=${CACHE_DURATION_HOURS:-48}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-csv}
      - DUAL_READ_FROM=${DUAL_READ_FROM:-csv}
      - ORACLE_USER=${ORACLE_USER:-}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-}
      - ORACLE_DSN=${ORACLE_DSN:-}
      - ORACLE_WALLET_LOCATION=${ORACLE_WALLET_LOCATION:-/app/oracle_wallet}
      - ORACLE_WALLET_PASSWORD=${ORACLE_WALLET_PASSWORD:-}
      - TZ=${TZ:-UTC}
      - VIRTUAL_HOST=${VIRTUAL_HOST:-pyvisionic.local}
      - VIRTUAL_PORT=${PORT:-5000}
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST:-}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./oracle_wallet:/app/oracle_wallet:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-5000}/api/collection-status')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nginx-proxy-network

  collector:
    container_name: pyvisionic-collector
    build: .
    command: python data_collector.py
    environment:
      - BLUELINKUSER=${BLUELINKUSER}
      - BLUELINKPASS=${BLUELINKPASS}
      - BLUELINKPIN=${BLUELINKPIN}
      - BLUELINKVID=${BLUELINKVID}
      - BLUELINKREGION=${BLUELINKREGION:-3}
      - BLUELINKBRAND=${BLUELINKBRAND:-2}
      - API_DAILY_LIMIT=${API_DAILY_LIMIT:-30}
      - API_CACHE_ENABLED=${API_CACHE_ENABLED:-true}
      - CACHE_DURATION_HOURS=${CACHE_DURATION_HOURS:-48}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-csv}
      - DUAL_READ_FROM=${DUAL_READ_FROM:-csv}
      - ORACLE_USER=${ORACLE_USER:-}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-}
      - ORACLE_DSN=${ORACLE_DSN:-}
      - ORACLE_WALLET_LOCATION=${ORACLE_WALLET_LOCATION:-/app/oracle_wallet}
      - ORACLE_WALLET_PASSWORD=${ORACLE_WALLET_PASSWORD:-}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./oracle_wallet:/app/oracle_wallet:ro
    restart: unless-stopped

networks:
  nginx-proxy-network:
    external: true
